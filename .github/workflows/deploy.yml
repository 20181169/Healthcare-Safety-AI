name: Deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lightsail-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Django app
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail

            cd "${{ secrets.LIGHTSAIL_PATH }}"

            if [ -f "/etc/healthcare-ai.env" ]; then
              set -a
              . /etc/healthcare-ai.env
              set +a
            elif [ -f ".env" ]; then
              set -a
              . ./.env
              set +a
            fi

            git fetch origin main
            git reset --hard origin/main

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            . .venv/bin/activate
            python -m pip install --upgrade pip wheel setuptools
            pip install -r requirements.txt
            pip install -r requirements-xray.txt
            pip install -r requirements-audio.txt
            pip install -r requirements-safety.txt
            pip install gunicorn

            python manage.py check
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            # ── systemd unit 자동 갱신 ───────────────────────────────────────
            # gunicorn 의 라이브 MJPEG 스트림이 워커를 점유해도 다른 요청이
            # 막히지 않도록 thread-based concurrency 보장.
            #   workers=1   : 모델 메모리 1회만 로드 (Lightsail RAM 절약)
            #   threads=8   : 1 process 안에서 8 동시 요청 처리
            #   gthread     : 스트리밍 호환 worker class
            #   timeout=120 : 첫 추론(모델 로드) 30초+ 걸려도 죽지 않음
            DEPLOY_DIR="$(pwd)"
            DEPLOY_USER="$(whoami)"
            sudo tee /etc/systemd/system/healthcare.service > /dev/null <<UNIT
            [Unit]
            Description=Healthcare & Safety AI Django (gunicorn + gthread)
            After=network.target

            [Service]
            Type=simple
            User=${DEPLOY_USER}
            WorkingDirectory=${DEPLOY_DIR}
            EnvironmentFile=-/etc/healthcare-ai.env
            ExecStart=${DEPLOY_DIR}/.venv/bin/gunicorn healthcare.wsgi:application \\
              --workers 1 \\
              --threads 8 \\
              --worker-class gthread \\
              --timeout 120 \\
              --graceful-timeout 30 \\
              --bind 127.0.0.1:8000 \\
              --access-logfile - \\
              --error-logfile -
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target
            UNIT

            sudo systemctl daemon-reload
            sudo systemctl enable healthcare.service
            sudo systemctl restart healthcare.service
            sudo systemctl status healthcare.service --no-pager
